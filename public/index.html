<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна №1 Репорт вразливостей Варіант №6</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Сервіс «репорт вразливості». Варіант №6</h1>

    <div class="main-container">
        <section class="form-section">
            <h2 id="formTitle">Додати новий репорт</h2>
            <form id="reportForm">
                <div class="form-group">
                    <label for="title">Назва вразливості:</label>
                    <input type="text" id="title" name="title">
                    <span class="error-msg" id="titleError"></span>
                </div>

                <div class="form-group">
                    <label for="severity">Важливість (Severity):</label>
                    <select id="severity" name="severity">
                        <option value="">Оберіть...</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                    <span class="error-msg" id="severityError"></span>
                </div>

                <div class="form-group">
                    <label for="description">Опис (Description):</label>
                    <textarea id="description" name="description" rows="4"></textarea>
                    <span class="error-msg" id="descriptionError"></span>
                </div>

                <div class="form-group">
                    <label for="reporter">Репортер (Reporter):</label>
                    <input type="text" id="reporter" name="reporter">
                    <span class="error-msg" id="reporterError"></span>
                </div>

                <button type="submit" id="submitBtn">Додати репорт</button>
            </form>
        </section>

        <section class="list-section">
            <h2>Список репортів</h2>
            
            <div class="filter-container" style="margin-bottom: 15px;">
                <input type="text" id="searchInput" placeholder="Пошук за назвою репорту...">
            </div>

            <table id="reportsTable">
                <thead>
                    <tr>
                        <th>Назва</th>
                        <th>Severity</th>
                        <th>Status</th>
                        <th>Reporter</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="reportsBody"></tbody>
            </table>
        </section>
    </div>

    <script src="./index.js"></script>
</body>
</html>
