<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сервіс репортів вразливостей</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Сервіс репортів вразливостей</h1>

    <main class="main-container">
        <section class="form-section">
            <h2 id="formTitle">Додати репорт</h2>
            <form id="reportForm">
                <div class="form-group">
                    <label for="title">Назва вразливості</label>
                    <input type="text" id="title" name="title">
                    <span class="error-msg" id="titleError"></span>
                </div>

                <div class="form-group">
                    <label for="severity">Важливість</label>
                    <select id="severity" name="severity">
                        <option value="">Оберіть...</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                    <span class="error-msg" id="severityError"></span>
                </div>

                <div class="form-group">
                    <label for="status">Статус</label>
                    <select id="status" name="status">
                        <option value="Open">Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Closed">Closed</option>
                    </select>
                    <span class="error-msg" id="statusError"></span>
                </div>

                <div class="form-group">
                    <label for="description">Опис</label>
                    <textarea id="description" name="description" rows="4"></textarea>
                    <span class="error-msg" id="descriptionError"></span>
                </div>

                <div class="form-group">
                    <label for="reporter">Репортер</label>
                    <input type="text" id="reporter" name="reporter">
                    <span class="error-msg" id="reporterError"></span>
                </div>

                <p class="form-message" id="formMessage"></p>
                <button type="submit" id="submitBtn">Додати репорт</button>
                <button type="button" id="cancelBtn" class="secondary-btn" hidden>Скасувати</button>
            </form>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Список репортів</h2>
                <input type="text" id="searchInput" placeholder="Пошук за назвою...">
            </div>

            <table id="reportsTable">
                <thead>
                    <tr>
                        <th>Назва</th>
                        <th>Severity</th>
                        <th>Status</th>
                        <th>Reporter</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="reportsBody"></tbody>
            </table>
        </section>
    </main>

    <script src="./index.js"></script>
</body>
</html>
